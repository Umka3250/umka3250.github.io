<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiaApp — Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #0a0a0a; color: #fff;
      flex-direction: column; gap: 16px;
    }
    .logo { font-size: 32px; font-weight: 800; color: #e53935; }
    p { color: #888; font-size: 15px; }
  </style>
  <script>
    // Pass OAuth params back to the DiaApp via custom scheme
    const params = window.location.search;
    const hash   = window.location.hash;
    window.location.replace("diaapp://oauth/dexcom" + params + hash);
  </script>
</head>
<body>
  <div class="logo">DiaApp</div>
  <p>Returning to app...</p>
</body>
</html>
